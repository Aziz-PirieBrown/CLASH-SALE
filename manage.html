<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Nexus 脤酶脳陋脰脨...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="loader" class="text-center">
        <div class="inline-block w-8 h-8 border-4 border-sky-500 border-t-transparent rounded-full spin mb-4"></div>
        <p class="text-slate-400 text-sm">脮媒脭脷陆芒脦枚脜盲脰脙...</p>
    </div>

    <div id="app" class="max-w-md w-full hidden">
        <h2 class="text-2xl font-bold text-white text-center mb-6">Hello, <span id="userName" class="text-sky-400">User</span></h2>
        <div id="groupsContainer"></div>
        <p class="text-center text-slate-600 text-xs mt-8">Powered by Nexus Static</p>
    </div>

    <script>
        (async function() {
            // ================= 脜盲脰脙脟酶脫貌 (YML脳脭露炉脤卯鲁盲) =================
            const REPO_OWNER = "__REPO_OWNER__";
            const REPO_NAME = "__REPO_NAME__";
            const FILE_PATH = "config.json";
            // ========================================================

            // 1. 禄帽脠隆 URL 虏脦脢媒脰脨碌脛 id
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const loader = document.getElementById('loader');

            if (!id) {
                // 脠莽鹿没脙禄脫脨 ID拢卢脧脭脢戮麓铆脦贸禄貌脤酶脳陋禄脴脰梅脪鲁
                loader.innerHTML = '<p class="text-rose-500">麓铆脦贸拢潞脦麓脤谩鹿漏 ID 虏脦脢媒</p>';
                return;
            }

            // 2. 禄帽脠隆 Token (脫毛鹿脺脌铆脪鲁脙忙脗脽录颅脪禄脰脗拢卢麓脫卤戮碌脴麓忙麓垄露脕脠隆)
            // 脮芒脩霉脠莽鹿没脛茫脭脷鹿脺脌铆脪鲁脙忙碌脟脗录鹿媒拢卢脮芒脌茂脪虏禄谩脧铆脢脺赂脽脝碌 API 碌梅脫脙脠篓脧脼
            const token = localStorage.getItem('gh_pat');

            // 3. 潞脣脨脛禄帽脠隆脢媒戮脻潞炉脢媒 (赂麓脫脙鹿脺脌铆脪鲁脙忙碌脛脗脽录颅 + 脭枚录脫露碌碌脳)
            async function fetchConfig() {
                try {
                    // 虏脽脗脭 A: 脫脜脧脠鲁垄脢脭 GitHub API (脢媒戮脻脳卯脨脗)
                    // 脠莽鹿没脫脨 Token拢卢麓酶脡脧 Token 脥路拢卢麓贸路霉脤谩赂脽脣脵脗脢脧脼脰脝虏垄脰搂鲁脰脣陆脫脨驴芒
                    const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}?v=${Date.now()}`;
                    const headers = token ? { 'Authorization': `token ${token}` } : {};
                    
                    console.log(token ? "脢鹿脫脙 Token 脟毛脟贸 API..." : "脦脼 Token拢卢鲁垄脢脭鹿芦驴陋脟毛脟贸...");
                    
                    const res = await fetch(apiUrl, { headers });
                    
                    if (res.ok) {
                        const data = await res.json();
                        // 脢鹿脫脙脫毛鹿脺脌铆脪鲁脙忙脥锚脠芦脪禄脰脗碌脛陆芒脗毛路陆脢陆拢潞base64 -> escape -> decodeURIComponent
                        // 脠路卤拢脰脨脦脛虏禄禄谩脗脪脗毛
                        return JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    }
                    
                    throw new Error("API 脟毛脟贸路脟 200");

                } catch (e) {
                    console.warn("GitHub API 禄帽脠隆脢搂掳脺 (驴脡脛脺脢脟脧脼脕梅禄貌脦脼脠篓脧脼)拢卢脟脨禄禄脰脕戮虏脤卢脦脛录镁露碌碌脳...", e);
                    
                    // 虏脽脗脭 B: 露碌碌脳露脕脠隆戮虏脤卢脦脛录镁 (Azure/GitHub Pages 鹿鹿陆篓潞贸碌脛脦脛录镁)
                    // 脫脜碌茫拢潞录芦驴矛隆垄脦脼脧脼脕梅拢禄脠卤碌茫拢潞驴脡脛脺脫脨录赂路脰脰脫碌脛鹿鹿陆篓脩脫鲁脵
                    const fallback = await fetch(`./config.json?v=${Date.now()}`);
                    if (!fallback.ok) throw new Error("戮虏脤卢脦脛录镁脪虏脦脼路篓露脕脠隆");
                    return await fallback.json();
                }
            }

            try {
                // 4. 脰麓脨脨禄帽脠隆虏垄虏茅脮脪脫脙禄搂
                const config = await fetchConfig();
                const userData = config[id];

                if (!userData) {
                    loader.innerHTML = `<p class="text-rose-500 font-bold">脦麓脮脪碌陆 ID 脜盲脰脙: ${id}</p>`;
                    return;
                }

                // 5. 脤谩脠隆脣霉脫脨脫脨脨搂脕麓陆脫
                let allLinks = [];
                for (let groupName in userData) {
                    const groupItems = userData[groupName];
                    for (let linkName in groupItems) {
                        const url = groupItems[linkName];
                        // 鹿媒脗脣驴脮脕麓陆脫
                        if (url && url.startsWith('http')) {
                            allLinks.push({ group: groupName, name: linkName, url: url });
                        }
                    }
                }

                // 6. 路脰脰搂脗脽录颅
                if (allLinks.length === 1) {
                    // === 脟茅驴枚 A: 脰禄脫脨脪禄赂枚脕麓陆脫 -> 脣虏录盲脳脭露炉脤酶脳陋 ===
                    window.location.replace(allLinks[0].url);
                } else if (allLinks.length > 1) {
                    // === 脟茅驴枚 B: 露脿赂枚脕麓陆脫 -> 盲脰脠戮 UI 脙忙掳氓 ===
                    renderUI(id, userData);
                } else {
                    loader.innerHTML = `<p class="text-slate-500">赂脙 ID 脧脗脙禄脫脨脜盲脰脙脫脨脨搂脕麓陆脫</p>`;
                }

            } catch (err) {
                loader.innerHTML = `<p class="text-rose-400">录脫脭脴脢搂掳脺: ${err.message}</p>`;
            }

            // UI 盲脰脠戮潞炉脢媒 (Tailwind 脩霉脢陆)
            function renderUI(userId, groups) {
                document.getElementById('userName').innerText = userId;
                const container = document.getElementById('groupsContainer');
                let html = '';

                for (const [groupName, links] of Object.entries(groups)) {
                    // 脭脵麓脦鹿媒脗脣脠路卤拢脰禄盲脰脠戮脫脨脨搂脕麓陆脫
                    const validLinks = Object.entries(links).filter(([_, url]) => url && url.startsWith('http'));
                    if (validLinks.length === 0) continue;

                    let linksHtml = validLinks.map(([name, url]) => `
                        <a href="${url}" target="_blank" class="flex justify-between items-center px-5 py-4 border border-slate-700 rounded-xl bg-slate-800 hover:bg-slate-700 hover:border-sky-500 text-slate-200 transition-all mb-3 group shadow-md">
                            <span class="font-medium">${name}</span>
                            <span class="text-slate-600 group-hover:text-sky-400 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                </svg>
                            </span>
                        </a>
                    `).join('');

                    html += `
                        <div class="mb-6 animate-fade-in-up">
                            <h3 class="text-xs font-bold text-slate-500 uppercase mb-3 tracking-widest pl-1">${groupName}</h3>
                            <div class="flex flex-col">${linksHtml}</div>
                        </div>
                    `;
                }

                container.innerHTML = html;
                loader.classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }
        })();
    </script>
</body>
</html>
